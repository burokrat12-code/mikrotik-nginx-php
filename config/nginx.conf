worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

stream {
    # Формат лога для TCP-прокси
    log_format stream_log '$remote_addr [$time_local] '
                          '$protocol $status $bytes_sent $bytes_received '
                          '$session_time "$upstream_addr" '
                          '"$ssl_preread_server_name"';

    access_log /var/log/nginx/stream_access.log stream_log;

    map $ssl_preread_server_name $target_backend {
        cargo-port.eu           web_backend;
        push.cargo-port.eu      web_backend;
        mail.cargo-port.eu      web_backend;
        default                 web_backend;
    }

    upstream web_backend {
        server 127.0.0.1:8443;
    }

    server {
        listen 443;
        proxy_pass $target_backend;
        ssl_preread on;
        proxy_protocol on;
        
        proxy_connect_timeout 10s;
        proxy_timeout 30s;
    }
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    server_tokens off;

    # ========== НАСТРОЙКА РЕАЛЬНЫХ IP ДЛЯ CLOUDFLARE ==========
    # Подключаем автоматически обновляемый список IP Cloudflare
    include /etc/nginx/cloudflare_real_ips.conf;
    
    # Доверяем локальному PROXY Protocol
    set_real_ip_from 127.0.0.1;
    
    # Включаем рекурсивный поиск реального IP
    real_ip_recursive on;

    # Формат логов с реальным IP
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # Базовые заголовки безопасности
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Подключаем конфиги сайтов
    include /etc/nginx/conf.d/*.conf;
}
